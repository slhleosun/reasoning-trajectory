# Dataset and Model Configuration
# This file stores the paths and configurations for datasets and models used in the reasoning trajectory project

datasets:
  gsm8k:
    name: "GSM8K"
    description: "Grade School Math 8K - Mathematical reasoning dataset"
    path: null  # Will be auto-downloaded from HuggingFace
    huggingface_id: "openai/gsm8k"
    split:
      train: "train"
      test: "test"
    cache_dir: null # "data/cache/gsm8k"

  math-500:
    name: "math-500"
    description: "MATH-500"
    path: null  # Will be auto-downloaded from HuggingFace
    huggingface_id: "HuggingFaceH4/MATH-500"
    split:
      test: "test"
    cache_dir: null # "data/cache/gsm8k"

  # Add more datasets here as needed
