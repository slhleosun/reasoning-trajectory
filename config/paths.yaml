  #     load_in_4bit: false

  llama-3.1-8b-instruct:
    name: "Meta-Llama-3.1-8B-Instruct"
    description: "Meta Llama 3.1 8B instruction-tuned model"
    model_type: "huggingface"
    path: null  # Will be auto-downloaded from HuggingFace
    huggingface_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
    cache_dir: null # "models/cache/llama-3.1-8b-instruct"
    tokenizer_path: null

    config:
      max_length: 512
      do_sample: false  # Deterministic greedy decoding
      use_cache: true
      device_map: "cuda"
      torch_dtype: "float16"
      load_in_8bit: false
      load_in_4bit: false
  
  llama-3.1-8b:
    name: "Meta-Llama-3.1-8B"
    description: "Meta Llama 3.1 8B base model"
    model_type: "huggingface"
    path: null  # Will be auto-downloaded from HuggingFace
    huggingface_id: "meta-llama/Meta-Llama-3.1-8B"
    cache_dir: null # "models/cache/llama-3.1-8b-instruct"
    tokenizer_path: null

    config:
      max_length: 512
      do_sample: false  # Deterministic greedy decoding
      use_cache: true
      device_map: "cuda"
      torch_dtype: "float16"
      load_in_8bit: false
      load_in_4bit: false

  deepseek-r1-distill-llama-8b:
    name: "DeepSeek-R1-Distill-Llama-8B"
    description: "DeepSeek R1 distilled model based on Llama-8B"
    model_type: "huggingface"
    path: null  # Will be auto-downloaded from HuggingFace
    huggingface_id: "deepseek-ai/DeepSeek-R1-Distill-Llama-8B"
    cache_dir: null
    tokenizer_path: null

    config:
      max_length: 512
      do_sample: false
      use_cache: true
      device_map: "auto"
      torch_dtype: "bfloat16"
      load_in_8bit: false
      load_in_4bit: false
      temperature: 0.0
      top_p: 1.0
      top_k: 1
      repetition_penalty: 1.0


  # Add more models here as needed

# Output directories
output:
  results: "output/results"
  trajectories: "output/trajectories"
  checkpoints: "output/checkpoints"
  logs: "output/logs"
  cache: "output/cache"
  complete_artifacts: "output/complete_artifacts"

# General settings
settings:
  seed: 42
  num_workers: 4
  batch_size: 8
  max_samples: null  # Set to null for all samples, or specify a number for debugging
  verbose: true
  use_gpu: true
  mixed_precision: true
