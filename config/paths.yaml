models:
  # llama-3.1-8b:
  #   name: "Meta-Llama-3.1-8B"
  #   description: "Meta Llama 3.1 8B base model"
  #   model_type: "huggingface"
  #   path: null  # Will be auto-downloaded from HuggingFace
  #   huggingface_id: "meta-llama/Meta-Llama-3.1-8B"
  #   cache_dir: "models/cache/llama-3.1-8b"
  #   tokenizer_path: null  # Use same as model path if null

  #   # Model-specific parameters
  #   config:
  #     max_length: 512
  #     temperature: 0
